<!DOCTYPE html>
<html lang="es">

<!-- Seccion HEAD del documento HTML -->
<head>
    <!-- Metaetiquetas basicas del documento -->
    <meta charset="UTF-8">

    <!-- Metaetiqueta viewport para responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Titulo de la pagina -->
    <title>{% block titulo %}Gestion Restaurante{% endblock %}</title>

    <!-- Bootstrap CSS desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Enlace a estilos personalizados CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">

    <!-- Bloque para estilos adicionales en plantillas hijas -->
    {% block estilos %}{% endblock %}
</head>

<!-- Seccion BODY del documento HTML -->
<body>
    <!-- BLOQUE 1 INCLUIR NAVBAR -->
    <!-- Incluir componente navbar -->
    {% include 'components/navbar.html' %}

    <!-- BLOQUE 2 CONTENIDO PRINCIPAL -->
    <!-- Contenedor principal de contenido -->
    <div class="content-wrapper">
        <!-- Contenedor de la aplicacion -->
        <div class="container my-5">
            <!-- Bloque de contenido para las plantillas hijas -->
            {% block contenido %}{% endblock %}
        </div>
    </div>

    <!-- BLOQUE 3 INCLUIR FOOTER -->
    <!-- Incluir componente footer -->
    {% include 'components/footer.html' %}

    <!-- BLOQUE 4 SCRIPTS -->
    <!-- Bootstrap JS desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Enlace a archivo JavaScript personalizado -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    <!-- Bloque para scripts adicionales en plantillas hijas -->
    {% block scripts %}{% endblock %}
</body>

</html>

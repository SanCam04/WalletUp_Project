<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - WalletUp</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <div class="card" style="width: 100%; max-width: 450px; margin: 1rem;">
    <div class="card-body">
      <h1 class="text-center mb-4">💰 WalletUp</h1>
      <p class="text-center text-muted mb-4">Gestiona tus finanzas inteligentemente</p>

      <div id="alertContainer"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" class="form-control" placeholder="Ingresa tu usuario" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-bottom: 1rem;">
          <span id="submitText">Iniciar Sesión</span>
          <span id="loadingSpinner" class="spinner" style="display: none;"></span>
        </button>
      </form>

      <p class="text-center text-muted">
        ¿No tienes cuenta? <a href="/registro">Registrarse</a>
      </p>

      <hr style="margin: 1.5rem 0;">

      <div class="text-center">
        <p style="font-size: 0.85rem; color: #718096; margin-bottom: 0.5rem;">Credenciales de prueba:</p>
        <p style="font-size: 0.85rem; margin-bottom: 0.25rem;"><strong>SuperAdmin:</strong> superadmin / SuperAdmin#2026</p>
        <p style="font-size: 0.85rem;"><strong>Cliente:</strong> cliente1 / Cliente#2026</p>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorías - WalletUp</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  {% include 'componentes/header.html' %}

  <div class="page-container">
    <div class="container">
      <h1>Mis Categorías</h1>
      <p class="text-muted">Organiza tus transacciones por categorías personalizadas</p>

      <div id="alertContainer"></div>

      <div class="card mb-4">
        <div class="card-body">
          <button class="btn btn-primary" onclick="mostrarModalCategoria()">➕ Nueva Categoría</button>
        </div>
      </div>

      <!-- Categorías de Ingresos -->
      <div class="card mb-4">
        <div class="card-header">
          <h3 class="m-0">💰 Categorías de Ingresos</h3>
        </div>
        <div class="card-body" id="ingresosContainer">
          <p class="text-center text-muted">Cargando categorías...</p>
        </div>
      </div>

      <!-- Categorías de Gastos -->
      <div class="card">
        <div class="card-header">
          <h3 class="m-0">💸 Categorías de Gastos</h3>
        </div>
        <div class="card-body" id="gastosContainer">
          <p class="text-center text-muted">Cargando categorías...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal para crear categoría -->
  <div id="modalCategoria" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Nueva Categoría</h3>
        <button class="modal-close" onclick="cerrarModal('modalCategoria')">×</button>
      </div>
      <form id="formCategoria" onsubmit="guardarCategoria(event)">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" class="form-control" placeholder="Ej: Alimentación, Transporte" required>
        </div>

        <div class="form-group">
          <label for="tipo">Tipo</label>
          <select id="tipo" class="form-control" required>
            <option value="">Selecciona un tipo</option>
            <option value="ingreso">Ingreso</option>
            <option value="gasto">Gasto</option>
          </select>
        </div>

        <div class="form-group">
          <label for="color">Color</label>
          <input type="color" id="color" class="form-control" value="#667eea" style="height: 50px; cursor: pointer;">
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="cerrarModal('modalCategoria')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Crear Categoría</button>
        </div>
      </form>
    </div>
  </div>

  {% include 'componentes/footer.html' %}

  <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
  <script src="{{ url_for('static', filename='js/categorias.js') }}"></script>
</body>
</html>

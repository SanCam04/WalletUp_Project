<header>
  <div class="container">
    <nav class="flex-between navbar">
      <div class="navbar-brand">💰 WalletUp</div>

      <div class="navbar-right">
        <button class="hamburger" id="hamburgerBtn">☰</button>

        <div class="dropdown">
          <button class="nav-link" id="userDropdown" style="border: none; background: none; cursor: pointer;">
            <span id="usuarioNombre">Usuario</span> ▼
          </button>
          <div class="dropdown-menu" id="dropdownMenu" style="display: none; position: absolute; right: 0; top: 100%; background: white; min-width: 150px; z-index: 100;">
            <a href="/perfil" class="dropdown-item">Mi Perfil</a>
            <hr style="margin: 0.5rem 0; border: none; border-top: 1px solid #e2e8f0;">
            <button id="logoutBtn" class="dropdown-item" style="width: 100%; text-align: left; border: none; background: none; cursor: pointer;">
              Cerrar Sesión
            </button>
          </div>
        </div>
      </div>

      <div class="flex gap-3 nav-menu" id="navLinks">
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/transacciones" class="nav-link">Transacciones</a>
        <a href="/categorias" class="nav-link">Categorías</a>
        <a href="/metas" class="nav-link">Metas</a>
        <a href="/deudas" class="nav-link">Deudas</a>
        <a href="/reportes" class="nav-link">Reportes</a>
        <a href="/educacion" class="nav-link">Educación</a>
        <a href="/admin/usuarios" class="nav-link" id="adminLink" style="display: none;">👥 Usuarios</a>
      </div>
    </nav>
  </div>
</header>

<script>
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const navMenu = document.getElementById('navLinks');
  const userDropdown = document.getElementById('userDropdown');
  const dropdownMenu = document.getElementById('dropdownMenu');

  // Menú hamburguesa
  hamburgerBtn.addEventListener('click', () => {
    navMenu.classList.toggle('active');
  });

  // Cerrar menú al hacer clic en un enlace
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      navMenu.classList.remove('active');
    });
  });

  // Dropdown de usuario
  userDropdown.addEventListener('click', () => {
    dropdownMenu.style.display = dropdownMenu.style.display === 'none' ? 'block' : 'none';
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown')) {
      dropdownMenu.style.display = 'none';
    }
  });


  document.addEventListener('DOMContentLoaded', () => {
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        try {
          const response = await fetch('/api/logout', { method: 'POST' });
          localStorage.removeItem('user');
          sessionStorage.clear();
          window.location.href = '/login';
        } catch (error) {
          console.error('Error:', error);
          window.location.href = '/login';
        }
      });
    }
  });

  // Mostrar enlace de admin si es superadmin
  fetch('/api/admin/usuarios', { method: 'GET' })
    .then(res => {
      if (res.ok) {
        document.getElementById('adminLink').style.display = 'block';
      }
    })
    .catch(() => {
      // Usuario no es superadmin
    });
</script>

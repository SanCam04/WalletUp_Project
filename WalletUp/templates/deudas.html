<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deudas - WalletUp</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  {% include 'componentes/header.html' %}

  <div class="page-container">
    <div class="container">
      <h1>Mis Deudas</h1>
      <p class="text-muted">Gestiona y sigue tus deudas pendientes</p>

      <div id="alertContainer"></div>

      <!-- Resumen de deudas -->
      <div class="row mb-4">
        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <h6 class="card-title text-muted">Total Adeudado</h6>
              <p class="card-value" id="totalAdeudado">$0.00</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <h6 class="card-title text-muted">Total Pagado</h6>
              <p class="card-value" id="totalPagado">$0.00</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <h6 class="card-title text-muted">Deudas Activas</h6>
              <p class="card-value" id="deudasActivas">0</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Botones de acción -->
      <div class="card mb-4">
        <div class="card-body">
          <button class="btn btn-primary" onclick="mostrarModalDeuda()">➕ Nueva Deuda</button>
        </div>
      </div>

      <!-- Tabla de deudas -->
      <div class="card">
        <div class="card-body" id="deudasContainer">
          <p class="text-center text-muted">Cargando deudas...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal para crear/editar deuda -->
  <div id="modalDeuda" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Nueva Deuda</h3>
        <button class="modal-close" onclick="cerrarModal('modalDeuda')">×</button>
      </div>
      <form id="formDeuda" onsubmit="guardarDeuda(event)">
        <div class="row">
          <!-- Columna izquierda -->
          <div class="col-md-6">
            <div class="form-group">
              <label for="nombre">Nombre de la Deuda</label>
              <input type="text" id="nombre" class="form-control" placeholder="Ej: Préstamo banco" required>
            </div>

            <div class="form-group">
              <label for="acreedor">Acreedor</label>
              <input type="text" id="acreedor" class="form-control" placeholder="Ej: Banco XYZ" required>
            </div>

            <div class="form-group">
              <label for="montoTotal">Monto Total</label>
              <input type="number" id="montoTotal" class="form-control" placeholder="0.00" step="0.01" required>
            </div>
          </div>

          <!-- Columna derecha -->
          <div class="col-md-6">
            <div class="form-group">
              <label for="fechaVencimiento">Fecha Vencimiento</label>
              <input type="date" id="fechaVencimiento" class="form-control">
            </div>

            <div class="form-group">
              <label for="tasaInteres">Tasa Interés (% Anual)</label>
              <input type="number" id="tasaInteres" class="form-control" placeholder="Ej: 5.5" step="0.01" value="0">
            </div>

            <div class="form-group">
              <label for="estado">Estado</label>
              <select id="estado" class="form-control">
                <option value="activa">Activa</option>
                <option value="pagada">Pagada</option>
                <option value="cancelada">Cancelada</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Descripción (ancho completo) -->
        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" class="form-control" placeholder="Descripción (opcional)" rows="3"></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="cerrarModal('modalDeuda')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  {% include 'componentes/footer.html' %}

  <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
  <script src="{{ url_for('static', filename='js/deudas.js') }}"></script>
</body>
</html>

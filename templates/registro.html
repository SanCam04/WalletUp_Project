<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - WalletUp</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <div class="card" style="width: 100%; max-width: 450px; margin: 1rem;">
    <div class="card-body">
      <h1 class="text-center mb-2">💰 WalletUp</h1>
      <p class="text-center text-muted mb-4">Crea tu cuenta y comienza ahora</p>

      <div id="alertContainer"></div>

      <form id="registroForm" onsubmit="handleRegistro(event)">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" class="form-control" placeholder="Elige un usuario" required>
          <small class="text-muted">Mínimo 3 caracteres</small>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="Crea una contraseña segura" required>
          <small class="text-muted">Mínimo 8 caracteres</small>
        </div>

        <div class="form-group">
          <label for="passwordConfirm">Confirmar Contraseña</label>
          <input type="password" id="passwordConfirm" class="form-control" placeholder="Confirma tu contraseña" required>
        </div>

        <div class="form-check">
          <input type="checkbox" id="terms" class="form-check-input" required>
          <label for="terms" class="form-check-label">
            Acepto los <a href="#terminos">términos y condiciones</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem;">
          <span id="submitText">Crear Cuenta</span>
          <span id="loadingSpinner" class="spinner"></span>
        </button>
      </form>

      <p class="text-center text-muted mt-3">
        ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
      </p>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>

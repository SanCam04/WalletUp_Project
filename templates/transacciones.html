<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transacciones - WalletUp</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  {% include 'componentes/header.html' %}

  <div class="page-container">
    <div class="container">
      <h1>Transacciones</h1>
      <p class="text-muted">Gestiona tus ingresos y gastos</p>

      <div id="alertContainer"></div>

      <div class="card mb-4">
        <div class="card-body">
          <button class="btn btn-success" onclick="mostrarModalTransaccion('ingreso')">➕ Nuevo Ingreso</button>
          <button class="btn btn-danger" onclick="mostrarModalTransaccion('gasto')">➖ Nuevo Gasto</button>
        </div>
      </div>

      <div class="card">
        <div class="card-body" id="transaccionesContainer">
          <p class="text-center text-muted">Cargando transacciones...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal para crear/editar transacción -->
  <div id="modalTransaccion" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Nueva Transacción</h3>
        <button class="modal-close" onclick="cerrarModal('modalTransaccion')">×</button>
      </div>
      <form id="formTransaccion" onsubmit="guardarTransaccion(event)">
        <div class="form-group">
          <label for="categoria">Categoría</label>
          <select id="categoria" class="form-control" required></select>
        </div>
        <div class="form-group">
          <label for="monto">Monto</label>
          <input type="number" id="monto" class="form-control" placeholder="0.00" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <input type="text" id="descripcion" class="form-control" placeholder="Descripción (opcional)">
        </div>
        <div class="form-group">
          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" class="form-control" required>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="cerrarModal('modalTransaccion')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  {% include 'componentes/footer.html' %}

  <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
  <script src="{{ url_for('static', filename='js/transacciones.js') }}"></script>
</body>
</html>

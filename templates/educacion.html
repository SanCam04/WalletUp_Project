<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Educación Financiera - WalletUp</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  {% include 'componentes/header.html' %}

  <div class="page-container">
    <div class="container">
      <h1>Centro de Educación Financiera</h1>
      <p class="text-muted">Aprende conceptos clave para mejorar tus finanzas</p>

      <div id="alertContainer"></div>

      <div class="card mb-4">
        <div class="card-body">
          <input type="text" id="buscarArticulo" class="form-control" placeholder="Buscar artículos..."
                 onkeyup="filtrarArticulos(this.value)">
        </div>
      </div>

      <div id="articulosContainer" class="row">
        <p class="text-center text-muted">Cargando contenido educativo...</p>
      </div>

      <!-- Modal para leer artículo -->
      <div id="modalArticulo" class="modal">
        <div class="modal-content" style="max-width: 800px;">
          <div class="modal-header">
            <h3 class="modal-title" id="tituloArticulo"></h3>
            <button class="modal-close" onclick="cerrarModal('modalArticulo')">×</button>
          </div>
          <div class="card-body" id="contenidoArticulo">
            <!-- El contenido se cargará aquí -->
          </div>
        </div>
      </div>
    </div>
  </div>

  {% include 'componentes/footer.html' %}

  <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
  <script src="{{ url_for('static', filename='js/educacion.js') }}"></script>
</body>
</html>
